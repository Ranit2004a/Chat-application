apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: chat-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: ranitmondal/chat-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        env:
        - name: NODE_ENV
          value: "development"

        envFrom:
        - secretRef:
            name: backend-secret